name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint → Type-check → Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medminder
          POSTGRES_PASSWORD: medminder_test
          POSTGRES_DB: medminder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://medminder:medminder_test@localhost:5432/medminder_test
      JWT_SECRET: ci-test-secret-key-minimum-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: cd packages/api && npx prisma generate

      - name: Push schema to test DB
        run: cd packages/api && npx prisma db push --skip-generate

      - name: Lint
        run: npx turbo run lint --parallel
        continue-on-error: true

      - name: Type-check
        run: npx turbo run type-check --parallel
        continue-on-error: true

      - name: Build all packages
        run: npx turbo run build

  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-typecheck-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd apps/web && npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
